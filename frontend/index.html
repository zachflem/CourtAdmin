<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourtAdmin</title>
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('ca_theme') || 'null');
        if (t) {
          var r = document.documentElement;
          r.style.setProperty('--primary', t.p);
          r.style.setProperty('--color-primary', t.p);
          r.style.setProperty('--secondary', t.s);
          r.style.setProperty('--color-secondary', t.s);
          r.style.setProperty('--accent', t.a);
          r.style.setProperty('--color-accent', t.a);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
