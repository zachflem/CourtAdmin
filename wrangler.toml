name = "court-admin"
main = "worker/src/index.ts"
compatibility_date = "2025-04-25"
compatibility_flags = ["nodejs_compat"]

# Custom domain — set in Cloudflare dashboard → Workers → court-admin → Custom Domains
# Live at: https://courtadmin.seezed.net

[[d1_databases]]
binding = "DB"
database_name = "court-admin-db"
database_id = "33198368-5fdc-497d-bd78-2c480c08b566"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "court-admin-assets"

[vars]
FRONTEND_URL = "https://court-admin.pages.dev"

# Secrets (set via `wrangler secret put`):
#   RESEND_API_KEY
#   CF_ACCESS_AUD
