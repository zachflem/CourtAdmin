name = "court-admin"
main = "worker/src/index.ts"
compatibility_date = "2025-04-25"
compatibility_flags = ["nodejs_compat"]

# Custom domain: https://courtadmin.seezed.net
# Set in Cloudflare dashboard → Workers → court-admin → Custom Domains

# Static frontend files served directly from the Worker
[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "court-admin-db"
database_id = "33198368-5fdc-497d-bd78-2c480c08b566"

# R2 bucket for user-uploaded media (logo, hero image, about image)
# Bound as UPLOADS to avoid collision with the reserved ASSETS binding
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "court-admin-assets"

[vars]
FRONTEND_URL = "https://courtadmin.seezed.net"
# Resend "from" address — must be a verified sender in your Resend account.
# The default works on Resend's free tier for testing; change for production.
RESEND_FROM_EMAIL = "onboarding@resend.dev"

# Secrets (set via `wrangler secret put`):
#   RESEND_API_KEY
#   CF_ACCESS_AUD
